name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Kiểm tra phiên bản Xcode
        run: xcodebuild -version

      - name: Cài đặt XcodeGen
        run: brew install xcodegen

      - name: Sinh cấu hình Xcode Project bằng XcodeGen
        run: xcodegen generate

      - name: Biên dịch ứng dụng
        run: |
          xcodebuild \
            -project RealtimeTranslator.xcodeproj \
            -scheme RealtimeTranslator \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Đóng gói TrollStore IPA
        run: |
          set -e
          brew install ldid
          rm -rf Payload
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release-iphoneos/*.app" -type d | head -n 1)
          echo "Tìm thấy đường dẫn app: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          APP_COPY=$(find Payload -maxdepth 1 -name "*.app" -type d | head -n 1)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_COPY/Info.plist")
          ldid -SRealtimeTranslator/TrollStore.entitlements "$APP_COPY/$EXECUTABLE"
          ldid -e "$APP_COPY/$EXECUTABLE"
          zip -r RealtimeTranslator-trollstore.ipa Payload

      - name: Upload TrollStore IPA
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-trollstore-ipa
          path: RealtimeTranslator-trollstore.ipa

      - name: Publish Direct IPA Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git tag -f latest
          git push origin latest --force
          gh release delete latest --yes || true
          gh release create latest RealtimeTranslator-trollstore.ipa \
            --title "RealtimeTranslator TrollStore IPA" \
            --notes "Direct .ipa build for TrollStore. Install RealtimeTranslator-trollstore.ipa, not the zipped GitHub artifact."
