name: Build iOS Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  changes:
    name: Check changed files
    runs-on: ubuntu-latest
    outputs:
      ipa_changed: ${{ steps.check.outputs.ipa_changed }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check IPA source changes
        id: check
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ipa_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi

          if git diff --name-only "$BASE" "$HEAD" | grep -E '^(RealtimeTranslator/|RealtimeTranslatorBroadcast/|project\.yml$)' >/dev/null; then
            echo "ipa_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "ipa_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-ipa:
    name: Build RealtimeTranslator IPA
    runs-on: macos-latest
    needs: changes
    if: needs.changes.outputs.ipa_changed == 'true'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -project RealtimeTranslator.xcodeproj \
            -scheme RealtimeTranslator \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build > xcodebuild.log 2>&1 || (grep -i -C 5 "error:" xcodebuild.log && exit 1)

      - name: Package TrollStore IPA
        run: |
          set -e
          brew install ldid
          rm -rf Payload
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release-iphoneos/*.app" -type d | head -n 1)
          cp -R "$APP_PATH" Payload/
          APP_COPY=$(find Payload -maxdepth 1 -name "*.app" -type d | head -n 1)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_COPY/Info.plist")
          ldid -SRealtimeTranslator/TrollStore.entitlements "$APP_COPY/$EXECUTABLE"
          find "$APP_COPY" -name "*.appex" -type d | while read -r EXTENSION_PATH; do
            EXTENSION_EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXTENSION_PATH/Info.plist")
            ldid -SRealtimeTranslatorBroadcast/Broadcast.entitlements "$EXTENSION_PATH/$EXTENSION_EXECUTABLE"
          done
          zip -r RealtimeTranslator-trollstore.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-trollstore-ipa
          path: RealtimeTranslator-trollstore.ipa

  build-frontboard:
    name: Build FrontBoard TIPA
    runs-on: macos-latest
    needs: changes

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          submodules: recursive
          path: theos

      - name: Checkout Theos iPhoneOS 16.5 SDK
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          ref: master
          sparse-checkout: iPhoneOS16.5.sdk
          path: theos/sdks

      - name: Install Theos build tools
        uses: dhinakg/procursus-action@main
        with:
          packages: coreutils make xz ldid

      - name: Build FrontBoard TrollStore shell
        working-directory: FrontBoardTranslator
        run: |
          set -e
          export THEOS="$GITHUB_WORKSPACE/theos"
          gmake package FINALPACKAGE=1 STRIP=0
          IPA_PATH=$(find packages -maxdepth 1 -name "*.ipa" -type f | head -n 1)
          cp "$IPA_PATH" "$GITHUB_WORKSPACE/TransifyrFrontBoard.tipa"

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TransifyrFrontBoard-trollstore-tipa
          path: TransifyrFrontBoard.tipa

  publish:
    name: Publish latest release
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-ipa
      - build-frontboard
    if: always() && needs.build-frontboard.result == 'success' && (needs.build-ipa.result == 'success' || needs.build-ipa.result == 'skipped')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download TIPA artifact
        uses: actions/download-artifact@v4
        with:
          name: TransifyrFrontBoard-trollstore-tipa

      - name: Download IPA artifact
        if: needs.changes.outputs.ipa_changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: RealtimeTranslator-trollstore-ipa

      - name: Publish release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git tag -f latest
          git push origin latest --force
          gh release delete latest --yes || true
          if [ "${{ needs.changes.outputs.ipa_changed }}" = "true" ]; then
            gh release create latest RealtimeTranslator-trollstore.ipa TransifyrFrontBoard.tipa \
              --title "RealtimeTranslator TrollStore packages" \
              --notes "IPA changed, so both the main IPA and FrontBoard TIPA were built."
          else
            gh release create latest TransifyrFrontBoard.tipa \
              --title "Transifyr FrontBoard TIPA" \
              --notes "Main IPA did not change, so only the FrontBoard TIPA was built."
          fi
