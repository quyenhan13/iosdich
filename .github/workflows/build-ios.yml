name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build RealtimeTranslator IPA
    runs-on: macos-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Kiểm tra phiên bản Xcode
        run: xcodebuild -version

      - name: Cài đặt XcodeGen
        run: brew install xcodegen

      - name: Sinh cấu hình Xcode Project bằng XcodeGen
        run: xcodegen generate

      - name: Biên dịch ứng dụng
        run: |
          xcodebuild \
            -project RealtimeTranslator.xcodeproj \
            -scheme RealtimeTranslator \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build > xcodebuild.log 2>&1 || (grep -i -C 5 "error:" xcodebuild.log && exit 1)

      - name: Đóng gói TrollStore IPA
        run: |
          set -e
          brew install ldid
          rm -rf Payload
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -path "*/Build/Products/Release-iphoneos/*.app" -type d | head -n 1)
          echo "Tìm thấy đường dẫn app: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          APP_COPY=$(find Payload -maxdepth 1 -name "*.app" -type d | head -n 1)
          EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_COPY/Info.plist")
          ldid -SRealtimeTranslator/TrollStore.entitlements "$APP_COPY/$EXECUTABLE"
          find "$APP_COPY" -name "*.appex" -type d | while read -r EXTENSION_PATH; do
            EXTENSION_EXECUTABLE=$(/usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$EXTENSION_PATH/Info.plist")
            ldid -SRealtimeTranslatorBroadcast/Broadcast.entitlements "$EXTENSION_PATH/$EXTENSION_EXECUTABLE"
          done
          ldid -e "$APP_COPY/$EXECUTABLE"
          zip -r RealtimeTranslator-trollstore.ipa Payload

      - name: Upload TrollStore IPA
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-trollstore-ipa
          path: RealtimeTranslator-trollstore.ipa

      - name: Publish Direct IPA Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git tag -f latest
          git push origin latest --force
          gh release delete latest --yes || true
          gh release create latest RealtimeTranslator-trollstore.ipa \
            --title "RealtimeTranslator TrollStore IPA" \
            --notes "Direct .ipa build for TrollStore. Install RealtimeTranslator-trollstore.ipa, not the zipped GitHub artifact."

  build-frontboard:
    name: Build FrontBoard subtitle shell
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          submodules: recursive
          path: theos

      - name: Checkout Theos iPhoneOS 16.5 SDK
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          ref: master
          sparse-checkout: iPhoneOS16.5.sdk
          path: theos/sdks

      - name: Install Theos build tools
        uses: dhinakg/procursus-action@main
        with:
          packages: coreutils make xz ldid

      - name: Build FrontBoard TrollStore shell
        working-directory: FrontBoardTranslator
        run: |
          set -e
          export THEOS="$GITHUB_WORKSPACE/theos"
          gmake package FINALPACKAGE=1 STRIP=0
          IPA_PATH=$(find packages -maxdepth 1 -name "*.ipa" -type f | head -n 1)
          cp "$IPA_PATH" "$GITHUB_WORKSPACE/TransifyrFrontBoard.tipa"

      - name: Upload FrontBoard shell
        uses: actions/upload-artifact@v4
        with:
          name: TransifyrFrontBoard-trollstore-tipa
          path: TransifyrFrontBoard.tipa

      - name: Download main app artifact
        uses: actions/download-artifact@v4
        with:
          name: RealtimeTranslator-trollstore-ipa
          path: combined-input

      - name: Build combined TrollStore package
        run: |
          set -e
          rm -rf combined-main combined-shell combined-package
          mkdir -p combined-main combined-shell combined-package/Payload
          unzip -q combined-input/RealtimeTranslator-trollstore.ipa -d combined-main
          unzip -q TransifyrFrontBoard.tipa -d combined-shell
          cp -R combined-main/Payload/*.app combined-package/Payload/
          cp -R combined-shell/Payload/*.app combined-package/Payload/
          (cd combined-package && zip -qr "$GITHUB_WORKSPACE/Transifyr-combined.tipa" Payload)

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: Transifyr-combined-tipa
          path: Transifyr-combined.tipa

      - name: Attach FrontBoard shell to latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh release upload latest TransifyrFrontBoard.tipa --clobber
          gh release upload latest Transifyr-combined.tipa --clobber
