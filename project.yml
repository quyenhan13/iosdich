name: RealtimeTranslator
options:
  bundleIdPrefix: com.vteen
  minimumXcodeGenVersion: 2.28.0

targets:
  RealtimeTranslator:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RealtimeTranslator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vteen.RealtimeTranslator
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: RealtimeTranslator/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: RealtimeTranslator/TrollStore.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: RealtimeTranslator/RealtimeTranslator-Bridging-Header.h
        DEVELOPMENT_TEAM: "" # Để trống để build không cần ký (unsigned) trên CI
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
    dependencies:
      - target: RealtimeTranslatorBroadcast
        embed: true

  RealtimeTranslatorBroadcast:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    productType: com.apple.product-type.app-extension
    sources:
      - path: RealtimeTranslatorBroadcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vteen.RealtimeTranslator.Broadcast
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: RealtimeTranslatorBroadcast/Info.plist
        CODE_SIGN_ENTITLEMENTS: RealtimeTranslatorBroadcast/Broadcast.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
